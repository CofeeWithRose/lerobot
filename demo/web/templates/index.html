<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>SO101 机械臂遥控器</title>
<style>
  :root {
    --bg: #0c0e13;
    --panel: #141820;
    --card: #1a1f2b;
    --accent: #ff8c00;
    --accent-dim: rgba(255,140,0,0.15);
    --accent-glow: rgba(255,140,0,0.4);
    --success: #00e676;
    --danger: #ff3d3d;
    --warning: #ffc107;
    --text: #e0e0e0;
    --text-dim: #6a7080;
    --border: #2a3040;
    --gauge-bg: #1e2430;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    font-family: 'Courier New', 'SF Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
  }

  /* ── iOS simulated fullscreen ── */
  html.ios-fullscreen,
  html.ios-fullscreen body {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    z-index: 99999;
  }

  /* ── Top bar ── */
  .top-bar {
    background: var(--panel);
    border-bottom: 2px solid var(--accent);
    padding: 6px 12px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 20px rgba(255,140,0,0.1);
    flex-shrink: 0;
  }
  .top-bar .title {
    font-size: 1.1rem; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 2px;
  }
  .top-bar .status-group { display: flex; align-items: center; gap: 12px; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block; animation: pulse 2s infinite;
  }
  .status-dot.green { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .status-dot.red   { background: var(--danger);  box-shadow: 0 0 8px var(--danger); }
  .status-dot.yellow { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { font-size: 0.8rem; color: var(--text-dim); }
  .live-tag {
    background: rgba(0,230,118,0.15); color: var(--success);
    border: 1px solid rgba(0,230,118,0.3);
    border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 1px;
  }
  .live-tag.busy { background: rgba(255,193,7,0.15); color: var(--warning); border-color: rgba(255,193,7,0.3); }

  .btn {
    padding: 6px 16px; border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; font-family: inherit; font-size: 0.8rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
  }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-acquire { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-acquire:hover:not(:disabled) { box-shadow: 0 0 12px var(--accent-glow); }
  .btn-release { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-release:hover:not(:disabled) { background: rgba(255,61,61,0.1); }
  .btn-action { background: transparent; color: var(--accent); border-color: var(--accent); }
  .btn-action:hover:not(:disabled) { background: var(--accent-dim); }
  .btn-estop {
    background: var(--danger); color: #fff; border-color: var(--danger);
    font-size: 0.9rem; font-weight: 900; letter-spacing: 2px;
    padding: 8px 16px; border-radius: 6px;
    box-shadow: 0 0 12px rgba(255,61,61,0.4);
    animation: estop-pulse 1.5s infinite;
  }
  .btn-estop:hover:not(:disabled) { box-shadow: 0 0 24px rgba(255,61,61,0.7); background: #ff1a1a; }
  .btn-estop:active:not(:disabled) { transform: scale(0.95); }
  @keyframes estop-pulse { 0%,100%{box-shadow: 0 0 12px rgba(255,61,61,0.4);} 50%{box-shadow: 0 0 20px rgba(255,61,61,0.6);} }

  /* ── Hint overlay ── */
  .hint-overlay {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; text-align: center;
  }
  .hint-overlay .hint-icon { font-size: 3rem; margin-bottom: 16px; }
  .hint-overlay .hint-title { font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }
  .hint-overlay .hint-desc { font-size: 0.85rem; color: var(--text-dim); max-width: 400px; line-height: 1.6; }
  .hint-overlay.occupied { border: 1px solid var(--warning); border-radius: 8px; margin: 20px; background: var(--panel); }

  /* ── Main cockpit layout ── */
  #controlPanel {
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  .cockpit {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    grid-template-rows: 1fr auto;
    gap: 6px;
    padding: 6px;
    max-width: 1100px;
    margin: 0 auto;
    height: 100%;
    max-height: 100%;
    overflow: hidden;
  }
  .cockpit-left { grid-column: 1; grid-row: 1; }
  .cockpit-center { grid-column: 2; grid-row: 1; display: flex; flex-direction: column; gap: 6px; align-items: center; justify-content: center; }
  .cockpit-right { grid-column: 3; grid-row: 1; }
  .cockpit-bottom { grid-column: 1 / -1; grid-row: 2; flex-shrink: 0; min-height: 0; overflow: hidden; }

  /* ── Joystick panel ── */
  .stick-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px; text-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%;
  }
  .stick-panel .panel-title {
    font-size: 0.7rem; color: var(--accent); text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 4px; font-weight: 700;
  }
  .stick-panel .axis-labels {
    font-size: 0.6rem; color: var(--text-dim); margin-bottom: 4px;
  }

  /* Joystick canvas area — responsive size */
  .joystick-container {
    position: relative;
    width: min(220px, 28vmin);
    height: min(220px, 28vmin);
    margin: 0 auto;
    background: radial-gradient(circle, var(--gauge-bg) 0%, var(--bg) 100%);
    border-radius: 50%;
    border: 2px solid var(--border);
    touch-action: none;
    flex-shrink: 0;
  }
  .joystick-crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .joystick-crosshair::before, .joystick-crosshair::after {
    content: ''; position: absolute; background: var(--border);
  }
  .joystick-crosshair::before {
    width: 1px; height: 100%; left: 50%; top: 0;
  }
  .joystick-crosshair::after {
    height: 1px; width: 100%; top: 50%; left: 0;
  }
  .joystick-ring {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70%; height: 70%;
    border: 1px dashed rgba(255,140,0,0.2);
    border-radius: 50%;
    pointer-events: none;
  }
  .joystick-knob {
    position: absolute;
    width: min(50px, 7vmin); height: min(50px, 7vmin);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #555, #222);
    border: 2px solid var(--accent);
    box-shadow: 0 0 12px var(--accent-glow), inset 0 2px 4px rgba(255,255,255,0.1);
    cursor: grab;
    transition: box-shadow 0.15s;
    touch-action: none;
    /* Default center position (CSS fallback before JS positions it) */
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
  }
  .joystick-knob:active, .joystick-knob.active {
    cursor: grabbing;
    box-shadow: 0 0 20px var(--accent-glow), 0 0 40px rgba(255,140,0,0.2), inset 0 2px 4px rgba(255,255,255,0.1);
  }
  .joystick-knob .knob-dot {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
  }

  /* Real-time position marker on joystick */
  .joystick-real-marker {
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    pointer-events: none;
    transition: top 0.15s ease-out, left 0.15s ease-out;
    opacity: 0.8;
    /* Default center position (CSS fallback before JS positions it) */
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
  }

  /* Gauge readouts below joystick */
  .gauge-row {
    display: flex; justify-content: space-around; margin-top: 4px;
  }
  .gauge-item {
    text-align: center;
  }
  .gauge-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .gauge-value {
    font-size: 1.1rem; color: var(--accent); font-weight: 700;
    font-family: 'Courier New', monospace;
  }
  .gauge-real { font-size: 0.7rem; color: var(--success); }

  /* ── Center controls: wrist roll knob + gripper ── */
  .center-control {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px; text-align: center; width: min(160px, 22vmin);
  }
  .center-control .panel-title {
    font-size: 0.7rem; color: var(--accent); text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 10px; font-weight: 700;
  }

  /* Rotary knob for wrist roll */
  .rotary-container {
    position: relative; width: min(80px, 12vmin); height: min(80px, 12vmin); margin: 0 auto;
    touch-action: none;
  }
  .rotary-track {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--gauge-bg);
    border: 2px solid var(--border);
    position: relative;
  }
  .rotary-indicator {
    position: absolute; top: 4px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 25%;
    background: var(--accent);
    border-radius: 2px;
    transform-origin: 50% 190%;
  }
  .rotary-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 30px; height: 30px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #555, #222);
    border: 1px solid var(--accent);
  }
  .rotary-value {
    margin-top: 8px; font-size: 1rem; color: var(--accent); font-weight: 700;
  }
  .rotary-real { font-size: 0.7rem; color: var(--success); }

  /* Gripper vertical slider */
  .gripper-track {
    position: relative; width: 36px; height: min(100px, 14vmin);
    margin: 0 auto;
    background: var(--gauge-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    touch-action: none;
  }
  .gripper-fill {
    position: absolute; bottom: 0; left: 0; width: 100%;
    background: linear-gradient(to top, var(--accent), rgba(255,140,0,0.3));
    border-radius: 0 0 20px 20px;
    transition: height 0.1s;
  }
  .gripper-real-fill {
    position: absolute; bottom: 0; right: 0; width: 6px;
    background: var(--success);
    border-radius: 0 0 3px 0;
    transition: height 0.15s ease-out;
    opacity: 0.7;
  }
  .gripper-thumb {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 50px; height: 24px;
    background: radial-gradient(circle at 50% 40%, #555, #222);
    border: 2px solid var(--accent);
    border-radius: 12px;
    cursor: grab;
    box-shadow: 0 0 8px var(--accent-glow);
    touch-action: none;
  }
  .gripper-thumb:active { cursor: grabbing; }
  .gripper-labels {
    display: flex; justify-content: space-between; margin-top: 6px;
    font-size: 0.6rem; color: var(--text-dim);
  }
  .gripper-value { margin-top: 4px; font-size: 0.9rem; color: var(--accent); font-weight: 700; }

  /* ── Bottom bar: actions + settings + log ── */
  .bottom-bar {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
  }
  .bottom-row {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .bottom-row .sep {
    width: 1px; height: 24px; background: var(--border);
  }
  .setting-group { display: flex; align-items: center; gap: 6px; }
  .setting-group label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .setting-group input, .setting-group select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 0.8rem;
  }
  .setting-group input[type="number"] { width: 70px; }

  /* Log */
  .log-panel {
    margin-top: 4px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 8px;
    max-height: 60px; overflow-y: auto;
    font-size: 0.65rem; color: var(--text-dim);
  }
  .log-entry { padding: 1px 0; }
  .log-ok  { color: var(--success); }
  .log-err { color: var(--danger); }
  .log-info { color: var(--text-dim); }

  /* ── Responsive: landscape mobile (primary use case) ── */
  @media (max-height: 500px) and (orientation: landscape) {
    .top-bar { padding: 2px 8px; }
    .top-bar .title { font-size: 0.75rem; letter-spacing: 1px; }
    .status-text { font-size: 0.65rem; }
    .btn { padding: 2px 8px; font-size: 0.6rem; }
    .cockpit {
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: 1fr auto;
      gap: 2px; padding: 2px;
    }
    .stick-panel { padding: 2px; border-radius: 6px; }
    .stick-panel .panel-title { font-size: 0.55rem; margin-bottom: 2px; letter-spacing: 1px; }
    .stick-panel .axis-labels { font-size: 0.5rem; margin-bottom: 1px; }
    .joystick-container { width: min(200px, 42vh); height: min(200px, 42vh); }
    .joystick-knob { width: min(50px, 10vh); height: min(50px, 10vh); }
    .gauge-row { margin-top: 2px; }
    .gauge-label { font-size: 0.45rem; }
    .gauge-value { font-size: 0.7rem; }
    .gauge-real { font-size: 0.5rem; }
    .center-control { padding: 2px; border-radius: 6px; width: min(100px, 15vmin); }
    .center-control .panel-title { font-size: 0.5rem; margin-bottom: 2px; }
    .rotary-container { width: min(50px, 9vh); height: min(50px, 9vh); }
    .rotary-center { width: 20px; height: 20px; }
    .rotary-value { font-size: 0.65rem; margin-top: 1px; }
    .rotary-real { font-size: 0.5rem; }
    .gripper-track { height: min(55px, 10vh); width: 26px; }
    .gripper-thumb { width: 40px; height: 18px; border-radius: 9px; }
    .gripper-value { font-size: 0.6rem; margin-top: 1px; }
    .gripper-labels { font-size: 0.5rem; margin-top: 2px; }
    .bottom-bar { padding: 2px 4px; border-radius: 4px; }
    .bottom-row { gap: 6px; }
    .setting-group label { font-size: 0.55rem; }
    .setting-group input, .setting-group select { padding: 1px 4px; font-size: 0.65rem; }
    .setting-group input[type="number"] { width: 50px; }
    .log-panel { max-height: 28px; padding: 1px 4px; font-size: 0.5rem; margin-top: 1px; }
    .sep { height: 16px; }
    #btnStandUp { padding: 2px 6px; font-size: 0.55rem; }
    #btnEmergencyStop { padding: 4px 8px; font-size: 0.6rem; }
  }

  /* ── Extra small landscape (e.g. iPhone SE, short screens < 380px) ── */
  @media (max-height: 380px) and (orientation: landscape) {
    .top-bar { padding: 1px 6px; }
    .top-bar .title { font-size: 0.65rem; }
    .joystick-container { width: min(160px, 38vh); height: min(160px, 38vh); }
    .joystick-knob { width: min(44px, 9vh); height: min(44px, 9vh); }
    .stick-panel .panel-title { display: none; }
    .stick-panel .axis-labels { display: none; }
    .gauge-row { margin-top: 1px; }
    .gauge-value { font-size: 0.6rem; }
    .center-control .panel-title { font-size: 0.45rem; }
    .rotary-container { width: min(40px, 8vh); height: min(40px, 8vh); }
    .gripper-track { height: min(45px, 9vh); width: 22px; }
    .bottom-bar { padding: 1px 3px; }
    .log-panel { display: none; }
  }

  /* ── Responsive: portrait tablet / small screen ── */
  @media (max-width: 800px) and (orientation: portrait) {
    body { overflow-y: auto; }
    #controlPanel { overflow-y: auto; }
    .cockpit {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      height: auto;
    }
    .cockpit-left { grid-column: 1; grid-row: 1; }
    .cockpit-right { grid-column: 2; grid-row: 1; }
    .cockpit-center { grid-column: 1 / -1; grid-row: 2; flex-direction: row; justify-content: center; }
    .cockpit-bottom { grid-column: 1 / -1; grid-row: 3; }
    .joystick-container { width: 180px; height: 180px; }
  }
  @media (max-width: 500px) and (orientation: portrait) {
    body { overflow-y: auto; }
    #controlPanel { overflow-y: auto; }
    .cockpit { grid-template-columns: 1fr; height: auto; }
    .cockpit-left { grid-column: 1; grid-row: 1; }
    .cockpit-right { grid-column: 1; grid-row: 2; }
    .cockpit-center { grid-column: 1; grid-row: 3; }
    .cockpit-bottom { grid-column: 1; grid-row: 4; }
  }
</style>
</head>
<body>

<!-- ═══ Top Bar ═══ -->
<div class="top-bar">
<div class="title">🏗 SO-101 机械臂控制</div>
  <div class="status-group">
    <span class="live-tag" id="liveBadge" style="display:none;">
      <span id="liveText">LIVE</span>
    </span>
    <span class="status-dot" id="statusDot"></span>
<span class="status-text" id="statusText">连接中...</span>
<button class="btn btn-acquire" id="btnAcquire" onclick="acquireControl()">获取控制</button>
<button class="btn btn-release" id="btnRelease" onclick="releaseControl()" style="display:none;">释放控制</button>
  </div>
</div>

<!-- ═══ Hint (before control) ═══ -->
<div id="controlHint" class="hint-overlay">
  <div class="hint-icon" id="hintIcon">🔓</div>
  <div class="hint-title" id="hintTitle">准备就绪</div>
  <div class="hint-desc" id="hintDesc">点击 <strong>「获取控制」</strong> 按钮来接管机械臂并进入操控界面。</div>
</div>

<!-- ═══ Cockpit (hidden until control) ═══ -->
<div id="controlPanel" style="display:none;">
  <div class="cockpit">

    <!-- Left Joystick: shoulder_pan (X=回转) + elbow_flex (Y=小臂伸缩) — ISO excavator standard -->
    <div class="cockpit-left">
      <div class="stick-panel">
<div class="panel-title">左摇杆 — 回转 & 小臂</div>
        <div class="axis-labels">← 右转 | 左转 → &nbsp;|&nbsp; ↑ 小臂伸 | 小臂收 ↓</div>
        <div class="joystick-container" id="joyLeft">
          <div class="joystick-crosshair"></div>
          <div class="joystick-ring"></div>
          <div class="joystick-real-marker" id="realLeft"></div>
          <div class="joystick-knob" id="knobLeft"><div class="knob-dot"></div></div>
        </div>
        <div class="gauge-row">
          <div class="gauge-item">
<div class="gauge-label">回转(X)</div>
<div class="gauge-value" id="gval_shoulder_pan">+0.000</div>
            <div class="gauge-real" id="greal_shoulder_pan">—</div>
          </div>
          <div class="gauge-item">
<div class="gauge-label">小臂(Y)</div>
<div class="gauge-value" id="gval_elbow_flex">+0.000</div>
            <div class="gauge-real" id="greal_elbow_flex">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Center: Wrist Roll + Gripper -->
    <div class="cockpit-center">
      <!-- Wrist Roll Rotary -->
      <div class="center-control">
<div class="panel-title">腕部旋转</div>
        <div class="rotary-container" id="rotaryContainer">
          <div class="rotary-track">
            <div class="rotary-indicator" id="rotaryIndicator"></div>
            <div class="rotary-center"></div>
          </div>
        </div>
<div class="rotary-value" id="gval_wrist_roll">+0.000</div>
        <div class="rotary-real" id="greal_wrist_roll">—</div>
      </div>

      <!-- Gripper -->
      <div class="center-control">
<div class="panel-title">夹爪</div>
        <div class="gripper-track" id="gripperTrack">
          <div class="gripper-fill" id="gripperFill" style="height:50%"></div>
          <div class="gripper-real-fill" id="gripperRealFill" style="height:50%"></div>
          <div class="gripper-thumb" id="gripperThumb" style="bottom:calc(50% - 12px)"></div>
        </div>
<div class="gripper-labels"><span>合拢</span><span>张开</span></div>
        <div class="gripper-value" id="gval_gripper">0.50</div>
        <div class="gauge-real" id="greal_gripper">—</div>
      </div>

      <!-- Emergency Stop -->
<button class="btn btn-estop" id="btnEmergencyStop" onclick="doEmergencyStop()" disabled style="width:100%;">🛑 紧急停止</button>

      <!-- Stand Up -->
<button class="btn btn-action" id="btnStandUp" onclick="doStandUp()" disabled style="width:100%;">🧍 站立复位</button>
    </div>

    <!-- Right Joystick: wrist_flex (X=腕部翻转) + shoulder_lift (Y=大臂升降) — ISO excavator standard -->
    <div class="cockpit-right">
      <div class="stick-panel">
<div class="panel-title">右摇杆 — 腕部 & 大臂</div>
        <div class="axis-labels">← 腕部外翻 | 腕部内翻 → &nbsp;|&nbsp; ↑ 大臂升 | 大臂降 ↓</div>
        <div class="joystick-container" id="joyRight">
          <div class="joystick-crosshair"></div>
          <div class="joystick-ring"></div>
          <div class="joystick-real-marker" id="realRight"></div>
          <div class="joystick-knob" id="knobRight"><div class="knob-dot"></div></div>
        </div>
        <div class="gauge-row">
          <div class="gauge-item">
<div class="gauge-label">大臂</div>
<div class="gauge-value" id="gval_shoulder_lift">+0.000</div>
            <div class="gauge-real" id="greal_shoulder_lift">—</div>
          </div>
          <div class="gauge-item">
<div class="gauge-label">腕部</div>
<div class="gauge-value" id="gval_wrist_flex">+0.000</div>
            <div class="gauge-real" id="greal_wrist_flex">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom: settings + log -->
    <div class="cockpit-bottom">
      <div class="bottom-bar">
        <div class="bottom-row">
          <div class="setting-group">
<label>动作时长</label>
            <input type="number" id="durationMs" value="200" min="50" max="5000" step="50">
            <span style="font-size:0.7rem; color:var(--text-dim);">ms</span>
          </div>
          <div class="sep"></div>
          <div class="setting-group">
<label>轮询</label>
            <select id="pollInterval" onchange="updatePollInterval()">
              <option value="100">100ms</option>
              <option value="200" selected>200ms</option>
              <option value="500">500ms</option>
              <option value="1000">1s</option>
            </select>
          </div>
          <div class="sep"></div>
          <div class="setting-group">
            <span class="status-dot green" id="pollDot" style="width:6px;height:6px;animation:none;"></span>
<span id="pollText" style="font-size:0.7rem; color:var(--text-dim);">轮询中</span>
          </div>
          <div style="flex:1;"></div>
<button class="btn btn-action" onclick="pollState()" style="font-size:0.7rem;">🔄 刷新</button>
        </div>
        <div class="log-panel" id="logPanel">
<div class="log-entry log-info">系统就绪。</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/rotary.js') }}"></script>
<script src="{{ url_for('static', filename='js/gripper.js') }}"></script>
<script src="{{ url_for('static', filename='js/polling.js') }}"></script>
<script src="{{ url_for('static', filename='js/controls.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
